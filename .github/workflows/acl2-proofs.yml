name: ACL2 Proof Certification

on:
  push:
    branches: [ master, main ]
    paths:
      - '**.lisp'
      - '**.md'
      - 'sources/**'
      - 'tools/**'
      - 'scripts/**'
      - '.github/workflows/acl2-proofs.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - '**.lisp'
      - '**.md'
      - 'sources/**'
      - 'tools/**'

jobs:
  validate-traces:
    name: Validate Source Traces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run trace validator
        env:
          PROJECT_ROOT: .
        run: python tools/validate_trace.py

  repo-check:
    name: Verify Review Documents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required review documents
        run: |
          missing=0
          for f in CERTIFICATION.md PROOF_TOUR.md TOP_5_THEOREMS.md \
                   reports/axiom_pressure_report.md \
                   reports/proof_dependency_report.md \
                   reports/v5_3_review_hardening_assessment.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=$((missing + 1))
            else
              echo "OK: $f"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "ERROR: $missing required review document(s) missing."
            exit 1
          fi

      - name: Check defaxiom trace coverage
        run: |
          # Count defaxioms in .lisp files
          axiom_count=$(grep -rh '(defaxiom ' *.lisp | wc -l)
          # Count trace rows (minus header)
          trace_count=$(($(wc -l < sources/clause_trace.csv) - 1))
          echo "defaxioms in .lisp: $axiom_count"
          echo "trace rows in CSV: $trace_count"
          if [ "$trace_count" -lt "$axiom_count" ]; then
            echo "ERROR: Not all defaxioms have trace entries ($trace_count < $axiom_count)"
            exit 1
          fi
          echo "OK: trace coverage adequate"

  certify:
    name: Certify ACL2 Books
    runs-on: ubuntu-latest
    needs: [validate-traces, repo-check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Pull ACL2 Docker image
        run: docker pull atwalter/acl2:latest

      # --- Dependency books ---
      - name: Certify core book
        run: echo '(certify-book "federal_save_act_core" ?)' | docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2

      - name: Certify facts book
        run: echo '(certify-book "federal_save_act_facts" ?)' | docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2

      # --- Core verification ---
      - name: Run consistency check
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_consistency_check.lisp 2>&1 | tee reports/consistency_check.log

      - name: Verify consistency check
        run: "! grep -q 'FAILED' reports/consistency_check.log"

      # --- Process model ---
      - name: Run process model
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_process.lisp 2>&1 | tee reports/process_model.log

      - name: Verify process model
        run: "! grep -q 'FAILED' reports/process_model.log"

      - name: Run process invariants
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_process_invariants.lisp 2>&1 | tee reports/process_invariants.log

      - name: Verify process invariants
        run: "! grep -q 'FAILED' reports/process_invariants.log"

      # --- Hinge books (separate — NOT combined) ---
      - name: Run hinge common
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_hinge_common.lisp 2>&1 | tee reports/hinge_common.log

      - name: Verify hinge common
        run: "! grep -q 'FAILED' reports/hinge_common.log"

      - name: Run hinge mandatory
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_hinge_mandatory.lisp 2>&1 | tee reports/hinge_mandatory.log

      - name: Verify hinge mandatory
        run: "! grep -q 'FAILED' reports/hinge_mandatory.log"

      - name: Run hinge discretionary
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_hinge_discretionary.lisp 2>&1 | tee reports/hinge_discretionary.log

      - name: Verify hinge discretionary
        run: "! grep -q 'FAILED' reports/hinge_discretionary.log"

      # --- Existentials and independence ---
      - name: Run existentials
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_existentials.lisp 2>&1 | tee reports/existentials.log

      - name: Verify existentials
        run: "! grep -q 'FAILED' reports/existentials.log"

      - name: Run independence
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_independence.lisp 2>&1 | tee reports/independence.log

      - name: Verify independence
        run: "! grep -q 'FAILED' reports/independence.log"

      # --- v5.2 deep process invariants ---
      - name: Run deep process invariants
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_deep_process_invariants.lisp 2>&1 | tee reports/deep_process_invariants.log

      - name: Verify deep process invariants
        run: "! grep -q 'FAILED' reports/deep_process_invariants.log"

      # --- v5.2 document proofs ---
      - name: Run document proofs
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_document_proofs.lisp 2>&1 | tee reports/document_proofs.log

      - name: Verify document proofs
        run: "! grep -q 'FAILED' reports/document_proofs.log"

      # --- v5.2 burden proofs ---
      - name: Run burden proofs
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_burden_proofs.lisp 2>&1 | tee reports/burden_proofs.log

      - name: Verify burden proofs
        run: "! grep -q 'FAILED' reports/burden_proofs.log"

      # --- v5.2 doctrine proofs ---
      - name: Run doctrine proofs
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_doctrine_proofs.lisp 2>&1 | tee reports/doctrine_proofs.log

      - name: Verify doctrine proofs
        run: "! grep -q 'FAILED' reports/doctrine_proofs.log"

      # --- v5.2 model consistency ---
      - name: Run model consistency
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_model_consistency.lisp 2>&1 | tee reports/model_consistency.log

      - name: Verify model consistency
        run: "! grep -q 'FAILED' reports/model_consistency.log"

      # --- Party models ---
      - name: Run challenger model
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_challenger_model.lisp 2>&1 | tee reports/challenger_model.log

      - name: Verify challenger model
        run: "! grep -q 'FAILED' reports/challenger_model.log"

      - name: Run government model
        run: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2 < federal_save_act_government_model.lisp 2>&1 | tee reports/government_model.log

      - name: Verify government model
        run: "! grep -q 'FAILED' reports/government_model.log"

      # --- Summary ---
      - name: Summary
        if: always()
        run: |
          echo "=== ACL2 Proof Certification Summary ==="
          total_qed=0
          total_failed=0
          for f in reports/*.log; do
            name=$(basename "$f" .log)
            qed=$(grep -c "Q\.E\.D\." "$f" || true)
            failed=$(grep -c "FAILED" "$f" || true)
            total_qed=$((total_qed + qed))
            total_failed=$((total_failed + failed))
            if [ "$failed" -gt 0 ]; then
              echo "❌ $name: $qed Q.E.D., $failed FAILED"
            else
              echo "✅ $name: $qed Q.E.D."
            fi
          done
          echo ""
          echo "TOTAL: $total_qed Q.E.D., $total_failed FAILED"

      - name: Upload proof logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-logs
          path: reports/*.log
          retention-days: 30
