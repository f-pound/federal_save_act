name: ACL2 Proof Certification

on:
  push:
    branches: [ master, main ]
    paths:
      - 'model/**.lisp'
      - '**.md'
      - 'sources/**'
      - 'tools/**'
      - 'scripts/**'
      - '.github/workflows/acl2-proofs.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'model/**.lisp'
      - '**.md'
      - 'sources/**'
      - 'tools/**'

jobs:
  validate-traces:
    name: Validate Source Traces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run trace validator
        env:
          PROJECT_ROOT: .
        run: python tools/validate_trace.py

  repo-check:
    name: Verify Review Documents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required review documents
        run: |
          missing=0
          for f in CERTIFICATION.md PROOF_TOUR.md TOP_5_THEOREMS.md \
                   reports/axiom_pressure_report.md \
                   reports/proof_dependency_report.md \
                   reports/v5_3_review_hardening_assessment.md \
                   reports/certification_status.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=$((missing + 1))
            else
              echo "OK: $f"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "ERROR: $missing required review document(s) missing."
            exit 1
          fi

      - name: Check defaxiom trace coverage
        run: |
          # Count defaxioms in .lisp files
          axiom_count=$(grep -rh '(defaxiom ' model/*.lisp | wc -l)
          # Count trace rows (minus header)
          trace_count=$(($(wc -l < sources/clause_trace.csv) - 1))
          echo "defaxioms in model/*.lisp: $axiom_count"
          echo "trace rows in CSV: $trace_count"
          if [ "$trace_count" -lt "$axiom_count" ]; then
            echo "ERROR: Not all defaxioms have trace entries ($trace_count < $axiom_count)"
            exit 1
          fi
          echo "OK: trace coverage adequate"

  certify:
    name: Certify ACL2 Books (certify-book)
    runs-on: ubuntu-latest
    needs: [validate-traces, repo-check]

    env:
      ACL2_CMD: docker run --rm -i -v ${{ github.workspace }}:/work -w /work atwalter/acl2:latest acl2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create log directory
        run: mkdir -p logs/certify

      - name: Pull ACL2 Docker image
        run: docker pull atwalter/acl2:latest

      # === Layer 0: Base clean books ===
      - name: certify-book core
        run: |
          echo '(certify-book "model/federal_save_act_core" ?)' | $ACL2_CMD 2>&1 | tee logs/certify/core.log
          test -f model/federal_save_act_core.cert

      - name: certify-book process
        run: |
          echo '(certify-book "model/federal_save_act_process" ?)' | $ACL2_CMD 2>&1 | tee logs/certify/process.log
          test -f model/federal_save_act_process.cert

      # === Layer 1: Source-traced axiom book ===
      - name: certify-book facts (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_facts" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/facts.log
          test -f model/federal_save_act_facts.cert

      # === Layer 2: Hinge dependency (includes facts) ===
      - name: certify-book hinge_common (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_hinge_common" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/hinge_common.log
          test -f model/federal_save_act_hinge_common.cert

      # === Layer 3: Hinge interpretation (includes hinge_common) ===
      - name: certify-book hinge_mandatory (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_hinge_mandatory" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/hinge_mandatory.log
          test -f model/federal_save_act_hinge_mandatory.cert

      - name: certify-book hinge_discretionary (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_hinge_discretionary" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/hinge_discretionary.log
          test -f model/federal_save_act_hinge_discretionary.cert

      # === Layer 4: Downstream (includes facts) ===
      - name: certify-book existentials (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_existentials" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/existentials.log
          test -f model/federal_save_act_existentials.cert

      - name: certify-book burden_proofs (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_burden_proofs" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/burden_proofs.log
          test -f model/federal_save_act_burden_proofs.cert

      - name: certify-book doctrine_proofs (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_doctrine_proofs" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/doctrine_proofs.log
          test -f model/federal_save_act_doctrine_proofs.cert

      - name: certify-book model_consistency (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_model_consistency" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/model_consistency.log
          test -f model/federal_save_act_model_consistency.cert

      - name: certify-book independence (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_independence" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/independence.log
          test -f model/federal_save_act_independence.cert

      - name: certify-book challenger_model (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_challenger_model" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/challenger_model.log
          test -f model/federal_save_act_challenger_model.cert

      - name: certify-book government_model (defaxioms-okp)
        run: |
          echo '(certify-book "model/federal_save_act_government_model" ? nil :defaxioms-okp t)' | $ACL2_CMD 2>&1 | tee logs/certify/government_model.log
          test -f model/federal_save_act_government_model.cert

      # === Layer 5: Clean process chain (no defaxiom dependency) ===
      - name: certify-book process_invariants
        run: |
          echo '(certify-book "model/federal_save_act_process_invariants" ?)' | $ACL2_CMD 2>&1 | tee logs/certify/process_invariants.log
          test -f model/federal_save_act_process_invariants.cert

      - name: certify-book deep_process_invariants
        run: |
          echo '(certify-book "model/federal_save_act_deep_process_invariants" ?)' | $ACL2_CMD 2>&1 | tee logs/certify/deep_process_invariants.log
          test -f model/federal_save_act_deep_process_invariants.cert

      - name: certify-book document_proofs
        run: |
          echo '(certify-book "model/federal_save_act_document_proofs" ?)' | $ACL2_CMD 2>&1 | tee logs/certify/document_proofs.log
          test -f model/federal_save_act_document_proofs.cert

      # === Layer 6: Consistency check (includes core only) ===
      - name: certify-book consistency_check
        run: |
          echo '(certify-book "model/federal_save_act_consistency_check" ?)' | $ACL2_CMD 2>&1 | tee logs/certify/consistency_check.log
          test -f model/federal_save_act_consistency_check.cert

      # === Verification ===
      - name: Verify all .cert files exist
        run: |
          echo "=== Certification Verification ==="
          total=0; missing=0
          for f in \
            model/federal_save_act_core \
            model/federal_save_act_process \
            model/federal_save_act_facts \
            model/federal_save_act_hinge_common \
            model/federal_save_act_hinge_mandatory \
            model/federal_save_act_hinge_discretionary \
            model/federal_save_act_existentials \
            model/federal_save_act_burden_proofs \
            model/federal_save_act_doctrine_proofs \
            model/federal_save_act_model_consistency \
            model/federal_save_act_independence \
            model/federal_save_act_challenger_model \
            model/federal_save_act_government_model \
            model/federal_save_act_process_invariants \
            model/federal_save_act_deep_process_invariants \
            model/federal_save_act_document_proofs \
            model/federal_save_act_consistency_check; do
            total=$((total + 1))
            if [ -f "${f}.cert" ]; then
              echo "✅ ${f}.cert"
            else
              echo "❌ ${f}.cert MISSING"
              missing=$((missing + 1))
            fi
          done
          echo ""
          echo "TOTAL: $total books, $((total - missing)) certified, $missing missing"
          [ "$missing" -eq 0 ] || exit 1

      - name: Upload certification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: certify-book-logs
          path: logs/certify/*.log
          retention-days: 30
